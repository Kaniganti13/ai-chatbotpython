<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aurora AI Workspace</title>
  <link rel="stylesheet" href="/static/css/styles.css" />
</head>

<body>
  <div class="container">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="logo">🌌 Aurora</div>
      <nav class="nav">
        <button class="nav-btn active">💬</button>
        <button class="nav-btn">📂</button>
        <button class="nav-btn">⚙️</button>
      </nav>
      <button id="newChatBtn" class="new-chat">
        + New Chat
      </button>
      <div class="history">
        <p>Recent Chats</p>
        <ul id="history-list"></ul>
      </div>
      <div class="profile">👤 Kaniganti</div>
    </aside>

    <!-- Main Workspace -->
    <main class="workspace">
      <header class="topbar">
        <h2>Aurora AI Dashboard</h2>
        <button id="toggleTheme">🌙</button>
      </header>

      <!-- Welcome Section -->
      <section class="welcome">
        <div class="orb"></div>
        <h1>Good Evening</h1>
        <h2>What’s on <span class="highlight">your mind?</span></h2>
      </section>

      <!-- Chat Area -->
      <section id="messages" class="chat-box"></section>

      <!-- Input Area -->
      <section class="input-area">
        <textarea id="messageInput" placeholder="Ask Aurora anything..."></textarea>
        <div class="input-actions">
          <button id="attachBtn">📎</button>
          <select id="modeSelector">
            <option>Default</option>
            <option>Creative</option>
            <option>Code</option>
          </select>
          <button id="sendBtn" class="send-btn">➤</button>
        </div>
      </section>

      <!-- Suggestion Cards -->
      <section class="suggestions">
        <div class="card">💡 Generate project ideas</div>
        <div class="card">📄 Summarize content</div>
        <div class="card">💻 Explain code</div>
        <div class="card">✉️ Create emails</div>
      </section>
    </main>
  </div>

  <script src="/static/js/app.js"></script>
</body>

</html>
